name: Daily Operational Directive

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update-directive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Directives and Update Readme
        run: python refresh_quotes.py

      - name: Commit and Push
        run: |
          git config --global user.name "Directive Bot"
          git config --global user.email "bot@bahattinyunus.com"
          
          if [[ -n $(git status -s) ]]; then
            git add README.md sozler.json
            git commit -m "docs: update daily operational directive and select new quotes"
            git push
          else
            echo "No changes to commit."
          fi
